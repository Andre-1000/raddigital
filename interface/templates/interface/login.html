{% extends "interface/base.html" %}
{% load static %}
{% block titulo %}Entrar — Sistema RAD{% endblock %}

{% block barra_topo %}
<header class="barra-topo" style="justify-content:center;">
  <span class="barra-topo__marca">
    <svg class="trilho" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M4 4 L4 20 M20 4 L20 20" stroke="#242472" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M4 8 L20 8 M4 13 L20 13 M4 18 L20 18" stroke="#fa5e13" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Sistema RAD
  </span>
</header>
{% endblock %}

{% block conteudo %}
<div class="cartao" style="max-width:380px; margin:2.5rem auto 0;">
  <h1 style="font-size:1.3rem;">Entrar</h1>
  <p class="texto-suave" style="margin-top:-0.25rem;">Informe seu login para continuar. Sem senha.</p>

  <div id="aviso-login"></div>

  <form id="form-login" novalidate>
    <div class="campo">
      <label for="campo-login">Login</label>
      <input type="text" id="campo-login" name="login" autocomplete="username" autocapitalize="off" required>
    </div>
    <button type="submit" class="botao botao--primaria" id="botao-entrar">Entrar</button>
  </form>
</div>
{% endblock %}

{% block script_extra %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Ja logado com token valido? Nao mostra login de novo.
    if (RadAuth.sessaoValida()) {
      window.location.href = '{% url "interface:inicio" %}';
      return;
    }

    const form = document.getElementById('form-login');
    const botao = document.getElementById('botao-entrar');
    const aviso = document.getElementById('aviso-login');

    function mostrarErro(mensagem) {
      aviso.innerHTML = `<div class="aviso aviso--erro">${mensagem}</div>`;
    }

    form.addEventListener('submit', async function (evento) {
      evento.preventDefault();
      aviso.innerHTML = '';

      const login = document.getElementById('campo-login').value.trim();
      if (!login) {
        mostrarErro('Informe seu login.');
        return;
      }

      if (!navigator.onLine) {
        mostrarErro('Sem conexão. É necessário estar online para fazer o primeiro login neste dispositivo.');
        return;
      }

      botao.disabled = true;
      botao.textContent = 'Entrando…';

      try {
        const resposta = await fetch('/usuarios/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: login, dispositivo: navigator.userAgent.slice(0, 100) }),
        });

        if (!resposta.ok) {
          const corpo = await resposta.json().catch(() => ({}));
          mostrarErro(corpo.erro || 'Não foi possível entrar. Confira o login e tente novamente.');
          return;
        }

        const dados = await resposta.json();
        RadAuth.salvarSessao({
          login: dados.login,
          token: dados.token,
          validade: dados.validade,
          perfis: dados.perfis,
        });

        // Aproveita que sabemos estar online (o login exige conexao)
        // para ja deixar os catalogos atualizados no dispositivo antes
        // de entrar na ferramenta (PADROES_E_DIRETRIZES 5.2). Se falhar
        // por qualquer motivo, nao bloqueia o login -- o rascunho podera
        // usar um cache antigo, se existir de uma sessao anterior.
        try {
          await RadDB.atualizarCatalogos();
        } catch (erroCatalogos) {
          console.warn('Nao foi possivel atualizar os catalogos agora:', erroCatalogos);
        }

        window.location.href = '{% url "interface:inicio" %}';
      } catch (erro) {
        mostrarErro('Erro de conexão. Tente novamente.');
      } finally {
        botao.disabled = false;
        botao.textContent = 'Entrar';
      }
    });
  });
</script>
{% endblock %}
