{% extends "interface/base.html" %}
{% block titulo %}Consultar RADs — Sistema RAD{% endblock %}

{% block cabecalho_extra %}
<style>
  /* Tela administrativa (uso predominante no computador): aproveita
     mais largura de tela do que o container-app padrão, que é
     dimensionado para preenchimento em campo no celular. */
  .container-app { max-width: var(--largura-app-administrativa); }
</style>
{% endblock %}

{% block conteudo %}
<div id="conteudo-protegido" style="display:none;">
  <h1 style="font-size:1.3rem;">Consultar RADs</h1>

  <div class="cartao">
    <div class="grade-campos">
      <div class="campo">
        <label for="filtro-numero-rad">N° RAD</label>
        <input type="text" id="filtro-numero-rad" placeholder="Ex.: R00001">
      </div>
      <div class="campo">
        <label for="filtro-numero-os">N° OS</label>
        <input type="text" id="filtro-numero-os">
      </div>
      <div class="campo">
        <label for="filtro-numero-sa">N° SA</label>
        <input type="text" id="filtro-numero-sa" inputmode="numeric">
      </div>
      <div class="campo">
        <label for="filtro-status">Status</label>
        <select id="filtro-status">
          <option value="">Todos</option>
          <option value="sincronizado">Sincronizado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <div class="campo">
        <label for="filtro-data-de">Data de preenchimento — de</label>
        <input type="date" id="filtro-data-de">
      </div>
      <div class="campo">
        <label for="filtro-data-ate">Data de preenchimento — até</label>
        <input type="date" id="filtro-data-ate">
      </div>

      <div class="campo">
        <label for="filtro-local-inicial">Local inicial</label>
        <select id="filtro-local-inicial">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="campo">
        <label for="filtro-local-final">Local final</label>
        <select id="filtro-local-final">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="campo">
        <label for="filtro-tipo-manutencao">Tipo de manutenção</label>
        <select id="filtro-tipo-manutencao">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="campo">
        <label for="filtro-numero-falha">N° falha</label>
        <input type="text" id="filtro-numero-falha">
      </div>

      <div class="campo">
        <label for="filtro-mch">MCH</label>
        <select id="filtro-mch">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="campo">
        <label for="filtro-linha-mch">Linha da MCH</label>
        <select id="filtro-linha-mch">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="campo">
        <label for="filtro-login-usuario">Técnico (login)</label>
        <input type="text" id="filtro-login-usuario">
      </div>

      <div class="campo">
        <label for="filtro-hp-inicio-de">Hora prog. início — de</label>
        <input type="datetime-local" id="filtro-hp-inicio-de">
      </div>
      <div class="campo">
        <label for="filtro-hp-inicio-ate">Hora prog. início — até</label>
        <input type="datetime-local" id="filtro-hp-inicio-ate">
      </div>
      <div class="campo">
        <label for="filtro-hr-inicio-de">Hora real início — de</label>
        <input type="datetime-local" id="filtro-hr-inicio-de">
      </div>
      <div class="campo">
        <label for="filtro-hr-inicio-ate">Hora real início — até</label>
        <input type="datetime-local" id="filtro-hr-inicio-ate">
      </div>
    </div>

    <div class="linha-acoes">
      <button type="button" class="botao botao--primaria" id="botao-filtrar">Filtrar</button>
      <button type="button" class="botao botao--secundaria" id="botao-limpar-filtros">Limpar filtros</button>
    </div>
  </div>

  <div id="aviso-consulta" style="margin-top:1rem;"></div>

  <div id="lista-rads" class="pilha" style="margin-top:1rem;"></div>
  <p id="mensagem-vazia" class="texto-suave centro" style="display:none; margin-top:2rem;">
    Nenhum RAD encontrado.
  </p>
</div>
{% endblock %}

{% block script_extra %}
<script>
  document.addEventListener('DOMContentLoaded', async function () {
    if (!RadAuth.exigirSessao()) return;
    if (!RadAuth.temPerfil('supervisor', 'administrador')) {
      window.location.href = '{% url "interface:inicio" %}';
      return;
    }
    document.getElementById('conteudo-protegido').style.display = '';

    const lista = document.getElementById('lista-rads');
    const aviso = document.getElementById('aviso-consulta');
    const mensagemVazia = document.getElementById('mensagem-vazia');

    function seloStatus(status) {
      const classe = status === 'cancelado' ? 'selo--offline' : 'selo--online';
      return `<span class="selo ${classe}">${status}</span>`;
    }

    function popularSelect(id, itens, valorChave, rotuloFn) {
      const select = document.getElementById(id);
      itens.forEach(function (item) {
        const opcao = document.createElement('option');
        opcao.value = item[valorChave];
        opcao.textContent = rotuloFn(item);
        select.appendChild(opcao);
      });
    }

    async function carregarCatalogos() {
      try {
        const resposta = await RadAuth.requisicaoAutenticada('/catalogos/todos/');
        if (!resposta.ok) return;
        const catalogos = await resposta.json();

        // Locais: identificador e' a sigla (CatLocal nao expoe 'id').
        popularSelect(
          'filtro-local-inicial',
          catalogos.locais,
          'sigla',
          (l) => `${l.sigla} — ${l.nome}`
        );
        popularSelect(
          'filtro-local-final',
          catalogos.locais,
          'sigla',
          (l) => `${l.sigla} — ${l.nome}`
        );

        popularSelect(
          'filtro-tipo-manutencao',
          catalogos.tipos_manutencao,
          'id',
          (t) => t.nome
        );

        popularSelect(
          'filtro-mch',
          catalogos.mch,
          'id',
          (m) => m.identificacao
        );

        // Linha da MCH e' campo texto no cadastro do AMV; usamos o
        // catalogo de linhas so para preencher as opcoes do select.
        popularSelect(
          'filtro-linha-mch',
          catalogos.linhas,
          'nome',
          (l) => l.nome
        );
      } catch (erro) {
        // Falha ao carregar catalogos nao deve travar a tela de consulta;
        // os filtros por texto continuam funcionando normalmente.
      }
    }

    async function carregarLista() {
      aviso.innerHTML = '';
      mensagemVazia.style.display = 'none';
      lista.innerHTML = '';

      const parametros = new URLSearchParams();

      function definirSeExistir(idCampo, nomeParametro) {
        const valor = document.getElementById(idCampo).value.trim();
        if (valor) parametros.set(nomeParametro, valor);
      }

      definirSeExistir('filtro-numero-rad', 'numero_rad');
      definirSeExistir('filtro-numero-os', 'numero_os');
      definirSeExistir('filtro-numero-sa', 'numero_sa');
      definirSeExistir('filtro-status', 'status');
      definirSeExistir('filtro-data-de', 'data_de');
      definirSeExistir('filtro-data-ate', 'data_ate');
      definirSeExistir('filtro-local-inicial', 'id_local_inicial');
      definirSeExistir('filtro-local-final', 'id_local_final');
      definirSeExistir('filtro-tipo-manutencao', 'id_tipo_manutencao');
      definirSeExistir('filtro-numero-falha', 'numero_falha');
      definirSeExistir('filtro-mch', 'id_mch');
      definirSeExistir('filtro-linha-mch', 'linha_mch');
      definirSeExistir('filtro-login-usuario', 'login_usuario');
      definirSeExistir('filtro-hp-inicio-de', 'hp_inicio_de');
      definirSeExistir('filtro-hp-inicio-ate', 'hp_inicio_ate');
      definirSeExistir('filtro-hr-inicio-de', 'hr_inicio_de');
      definirSeExistir('filtro-hr-inicio-ate', 'hr_inicio_ate');

      try {
        const resposta = await RadAuth.requisicaoAutenticada(`/consulta/rads/?${parametros.toString()}`);
        if (!resposta.ok) {
          aviso.innerHTML = '<div class="aviso aviso--erro">Não foi possível carregar os RADs.</div>';
          return;
        }
        const dados = await resposta.json();

        if (dados.resultados.length === 0) {
          mensagemVazia.style.display = '';
          return;
        }

        dados.resultados.forEach(function (rad) {
          const item = document.createElement('a');
          item.className = 'cartao cartao--interativo';
          item.style.display = 'block';
          item.style.textDecoration = 'none';
          item.style.color = 'inherit';
          item.href = `/consultar/${rad.numero_rad}/`;
          item.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <strong>${rad.numero_rad}</strong>
              ${seloStatus(rad.status)}
            </div>
            <div class="texto-suave" style="margin-top:0.35rem; font-size:0.9rem;">
              OS ${rad.numero_os} · ${rad.data_preenchimento} · ${rad.tipo_manutencao}
            </div>
          `;
          lista.appendChild(item);
        });

        if (dados.total_paginas > 1) {
          const infoPaginas = document.createElement('p');
          infoPaginas.className = 'texto-suave centro';
          infoPaginas.style.fontSize = '0.85rem';
          infoPaginas.textContent = `${dados.total_encontrado} RAD(s) encontrado(s) — mostrando página ${dados.pagina_atual} de ${dados.total_paginas}`;
          lista.appendChild(infoPaginas);
        }
      } catch (erro) {
        aviso.innerHTML = '<div class="aviso aviso--erro">Erro de conexão ao carregar os RADs.</div>';
      }
    }

    function limparFiltros() {
      [
        'filtro-numero-rad', 'filtro-numero-os', 'filtro-numero-sa',
        'filtro-status', 'filtro-data-de', 'filtro-data-ate',
        'filtro-local-inicial', 'filtro-local-final', 'filtro-tipo-manutencao',
        'filtro-numero-falha', 'filtro-mch', 'filtro-linha-mch',
        'filtro-login-usuario', 'filtro-hp-inicio-de', 'filtro-hp-inicio-ate',
        'filtro-hr-inicio-de', 'filtro-hr-inicio-ate',
      ].forEach(function (id) {
        document.getElementById(id).value = '';
      });
      carregarLista();
    }

    document.getElementById('botao-filtrar').addEventListener('click', carregarLista);
    document.getElementById('botao-limpar-filtros').addEventListener('click', limparFiltros);

    await carregarCatalogos();
    await carregarLista();
  });
</script>
{% endblock %}
