[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py

# Qualquer RuntimeWarning (ex.: DateTimeField recebendo datetime "naive"
# com USE_TZ=True) vira erro de teste, nao apenas um aviso no console.
# Este bug ja apareceu duas vezes de forma independente (sincronizacao
# e filtros de consulta) porque o parsing de data/hora estava
# duplicado em cada view. Ver comum/datas.py para o ponto unico de
# conversao que substituiu essas duplicacoes.
filterwarnings =
    error::RuntimeWarning
